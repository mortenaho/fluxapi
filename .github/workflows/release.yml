name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to'
        required: true
        default: 'v1.2.4'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:ci

      - name: Prepare stable download filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist-installer/*.exe | Where-Object { $_.Name -ne 'Lisek-Setup.exe' } | Select-Object -First 1
          if (-not $installer) { throw 'Installer not found in dist-installer/' }
          Copy-Item $installer.FullName dist-installer/Lisek-Setup.exe -Force
          Get-ChildItem dist-installer/*.exe | Format-Table Name, Length

      - name: Create GitHub Release (if needed)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --generate-notes --title $tag
          }

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release upload "$env:RELEASE_TAG" dist-installer/Lisek-Setup.exe --clobber
